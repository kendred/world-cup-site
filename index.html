<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup Draft Tracker</title>
<link rel="stylesheet" href="style.css?v=5" />
</head>
<body>
  <header class="topbar">
    <h1>World Cup 2026 Draft Tracker</h1>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="teams">Team Draft</button>
      <button class="tab-btn" data-tab="refs">Ref Draft</button>
    </nav>
  </header>

  <main>
    <section id="tab-teams" class="tab-panel active">
      <p class="prize-banner">First place: $150 &middot; Second place: $75 &middot; Card winner: $25</p>
      <div class="teams-layout">
        <div class="bracket" id="bracket"></div>
        <div class="points-panel" id="points-panel"></div>
      </div>
    </section>

    <section id="tab-refs" class="tab-panel">
      <p class="prize-banner">Didj sends the winner a silver whistle 🪈</p>
      <div class="ref-leaderboard" id="ref-leaderboard"></div>
      <div class="refs-layout" id="refs-layout"></div>
    </section>
  </main>

  <script src="data/teams.js?v=1"></script>
  <script src="data/bracket.js?v=14"></script>
  <script src="data/refs.js?v=12"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
